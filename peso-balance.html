<!DOCTYPE html>
<!--
==================================================================================
  PESO Y BALANCE — Aeroclub Río Grande
  v1.5 ·  Ancho máximo del contenedor (.wrap) sube de 980px a 1280px, mismo
          criterio que turnos.html v6.34, fpl.html v3.23 y portal-alumno.html v1.14.
  v1.4 ·  Se saca el cartel rojo "PESO VACÍO SIN VERIFICAR" (estado-box bad) por
          pedido explícito — quedaba redundante con el disclaimer ámbar general
          y dos avisos apilados (rojo + ámbar) resultaba excesivo. El flag
          `verificado` en AERONAVES_WB se MANTIENE intacto en los datos (LV-ART
          y LV-MPH siguen en false) para no perder esa distinción a futuro;
          solo se deja de usar para el cartel grande. Sigue usándose en un lugar
          puntual: el sufijo "(DATOS SIN VERIFICAR)" dentro del cuadro de
          resultado ok/bad cuando el cálculo da OK — eso no se tocó.
  v1.3 ·  Disclaimer general ("HERRAMIENTA DE PLANIFICACIÓN — no reemplaza el
          cálculo oficial") ahora se muestra SIEMPRE, para las 3 aeronaves,
          incluido LV-OAD. Antes solo aparecía el aviso de "PESO VACÍO SIN
          VERIFICAR" cuando verificado:false (LV-ART/LV-MPH) — LV-OAD, al tener
          datos reales de planilla, no mostraba ningún aviso y daba la impresión
          de ser el cálculo "oficial" de la app. Los dos avisos son
          independientes y pueden convivir: el general (ámbar, .estado-box.info)
          siempre va primero, el de datos sin verificar (rojo, .estado-box.bad)
          se agrega debajo solo si corresponde.
  v1.2 ·  LV-ART y LV-MPH agregados con datos reales del POH/TCDS (antes
          "próximamente"). Esquema generalizado de "estaciones" de carga
          (lista de filas/compartimentos con su propio brazo, en vez de los
          4 campos fijos piloto/pasajero/combustible/equipaje de antes) —
          necesario porque Archer (4 plazas) y Lance (6 plazas, 3 filas, 2
          compartimentos de equipaje) no entran en el molde de 1 sola fila
          del Tomahawk. Aviso explícito (estado-box rojo) en pantalla mientras
          el peso vacío de un avión sea una estimación sin confirmar contra
          la planilla de pesaje real — LV-ART y LV-MPH arrancan así.
  v1.1 ·  Tooltip (title) con la conversión a kg en todos los valores que se
          muestran en lbs: Peso total, MTOW y Peso disponible (resBox), y los
          ticks del eje Y + etiqueta MTOW del ábaco SVG. Affordance visual:
          subrayado punteado + cursor "help" en los valores que tienen tooltip.
  v1.0 ·  Primera versión. Calculadora de peso y balance, replicando la planilla
          de Excel del club (envolvente, combustible, equipaje, piloto/pasajero)
          con gráfico de ábaco dibujado en SVG (polígono + punto de CG).

          Acceso: página APARTE de portal-alumno.html, valida la sesión de
          turnos.html (sessionStorage 'lvoad-session', misma pestaña) pero a
          diferencia del portal deja entrar CUALQUIER rol (alumno/piloto/
          instructor/admin/administrador) — la herramienta aplica a todo el que
          vuela, no solo a alumnos en instrucción. Sin sesión, redirige a
          turnos.html. No usa Firebase para nada: no guarda ni lee datos, todo
          se tipea a mano cada vez (decisión explícita, no hace falta más).

          Aeronaves: arranca con LV-OAD (Tomahawk PA-38-112) con datos reales de
          la planilla. LV-ART y LV-MPH están listados pero marcados "PRÓXIMAMENTE"
          — falta cargar los datos de peso y balance de cada POH. Agregar un
          avión nuevo es solo sumar una entrada al objeto AERONAVES_WB, no hay
          que tocar el resto del código.

          FIX respecto a la planilla original: la planilla tenía un bug real en
          la celda "Equipaje OK" (B19): comparaba el número fijo 14 contra 100,
          nunca el peso real de equipaje — siempre daba "OK" sin importar cuánto
          se cargara. Acá no se replica: en vez de un chequeo de equipaje aparte,
          se valida geométricamente si el punto (brazo, peso) cae DENTRO del
          polígono de la envolvente completa, que es más estricto y correcto que
          comparar cualquier cosa solo contra el MTOW.
==================================================================================
-->

<script>
// ── GATE DE SESIÓN ───────────────────────────────────────────────
// A diferencia de portal-alumno.html, NO se filtra por rol: entra cualquiera
// que tenga sesión activa en turnos.html (alumno, piloto, instructor, admin,
// administrador). El peso y balance le importa a todo el que vuela.
let session=null, userLabel='', userRol='';
(function gate(){
  let s=null;
  try{ s=JSON.parse(sessionStorage.getItem('lvoad-session')||'null'); }catch(_){ s=null; }
  if(s && (s.tipo==='alumno' || s.tipo==='instructor')) session=s;
  if(!session){
    document.getElementById('gate-msg').style.display='block';
    setTimeout(()=>{ location.href='turnos.html'; },900);
    return;
  }
  userLabel=session.user||session.username||session.nombre||session.emailKey||'';
  userRol=session.rol||(session.tipo==='instructor'?(session.soloUsuarios?'admin':'instructor'):'');
  document.getElementById('who-label').textContent=userLabel+(userRol?' · '+userRol.toUpperCase():'');
  document.getElementById('app-wrap').style.display='block';
})();

window.toggleTheme=function(){
  const isLight=document.documentElement.classList.toggle('light');
  localStorage.setItem('lvoad-theme',isLight?'light':'dark');
};

const $=id=>document.getElementById(id);

/* ============================ DATOS DE AERONAVES ============================
   v1.2: esquema generalizado por "estaciones" de carga (en vez de los 4 campos
   fijos piloto/pasajero/combustible/equipaje de la v1.0/v1.1, pensados solo
   para el Tomahawk de 2 plazas en una sola fila). Archer (4 plazas) y Lance
   (6 plazas, 3 filas, 2 compartimentos de equipaje) necesitan más de una
   fila/compartimento, cada uno con su propio brazo — por eso cada avión
   declara su propia lista de `estaciones`, y el formulario/cálculo/SVG se
   generan dinámicamente a partir de esa lista. Agregar un avión nuevo es
   sumar una entrada acá; no hace falta tocar el resto del código.

   `verificado:false` = el peso_vacio/brazo_vacio son una ESTIMACIÓN, no el
   dato real de pesaje de ESTE avión puntual. La pantalla muestra un aviso
   explícito mientras siga así — confirmar contra la planilla de pesaje real
   antes de usar para vuelo. El resto de los datos (brazos de estaciones,
   envolvente, MTOW) son de certificación (TCDS/POH) y SÍ son fijos para el
   modelo, no varían entre aeronaves del mismo tipo:
   - LV-OAD: planilla original del club (verificada).
   - LV-ART: brazos/envolvente/MTOW de TCDS+POH del PA-28-181 Archer II.
     peso_vacio/brazo_vacio: placeholder de catálogo, SIN dato real de LV-ART.
   - LV-MPH: brazos/envolvente/MTOW de la TCDS A3SO de la FAA (Modelo V,
     PA-32RT-300 Lance II). peso_vacio: estimado a partir de la carga útil
     publicada en flota.html (514 kg / 1134 lbs ⇒ 3600-1134=2466 lbs) — NO es
     un dato de pesaje confirmado, falta validar contra la planilla real.

   Unidades: brazo en pulgadas, peso en libras (estándar de TCDS/POH). El
   usuario carga personas/equipaje en KG y combustible en LITROS; se convierte
   todo internamente con kg_a_lb / fuel_kg_por_litro. */
const AERONAVES_WB={
  'LV-OAD':{
    nombre:'LV-OAD · Tomahawk PA-38-112',
    verificado:true,
    peso_vacio:1187, brazo_vacio:74.96,
    mtow:1670,
    kg_a_lb:2.2, fuel_kg_por_litro:0.72, consumo_lh:22,
    estaciones:[
      {id:'piloto', label:'Piloto (kg)', brazo:85.50, tipo:'persona', valorDefault:80},
      {id:'pasajero', label:'Pasajero (kg)', brazo:85.50, tipo:'persona', valorDefault:0, hint:'Dejá en 0 si volás solo'},
      {id:'combustible', label:'Combustible (litros)', brazo:75.40, tipo:'combustible', valorDefault:50},
      {id:'equipaje', label:'Equipaje (kg)', brazo:115.00, tipo:'equipaje', valorDefault:0}
    ],
    envolvente:[[72.4,1000],[72.4,1277],[73.5,1670],[78.5,1670],[78.5,1000]]
  },
  'LV-ART':{
    nombre:'LV-ART · Archer II PA-28-181',
    verificado:false,
    peso_vacio:1550, brazo_vacio:86.0,
    mtow:2550,
    kg_a_lb:2.2, fuel_kg_por_litro:0.72, consumo_lh:38,
    estaciones:[
      {id:'piloto', label:'Piloto (kg)', brazo:80.50, tipo:'persona', valorDefault:80},
      {id:'pasajero_del', label:'Pasajero delantero (kg)', brazo:80.50, tipo:'persona', valorDefault:0, hint:'Asiento junto al piloto'},
      {id:'pasajeros_tras', label:'Pasajeros traseros (kg, total)', brazo:118.10, tipo:'persona', valorDefault:0, hint:'Hasta 2 personas'},
      {id:'combustible', label:'Combustible (litros)', brazo:95.00, tipo:'combustible', valorDefault:100},
      {id:'equipaje', label:'Equipaje (kg)', brazo:142.80, tipo:'equipaje', valorDefault:0, max_kg:90.7, max_lbl:'200 lbs'}
    ],
    envolvente:[[82.0,1500],[82.0,2050],[88.5,2550],[93.0,2550],[93.0,1500]]
  },
  'LV-MPH':{
    nombre:'LV-MPH · Lance II PA-32RT-300',
    verificado:false,
    peso_vacio:2466, brazo_vacio:90.0,
    mtow:3600,
    kg_a_lb:2.2, fuel_kg_por_litro:0.72, consumo_lh:68.1,
    estaciones:[
      {id:'piloto', label:'Piloto (kg)', brazo:85.50, tipo:'persona', valorDefault:80},
      {id:'pasajero_del', label:'Pasajero delantero (kg)', brazo:85.50, tipo:'persona', valorDefault:0, hint:'Asiento junto al piloto'},
      {id:'pasajeros_centro', label:'Pasajeros fila central (kg, total)', brazo:118.10, tipo:'persona', valorDefault:0, hint:'Hasta 3 personas'},
      {id:'pasajeros_tras', label:'Pasajeros fila trasera (kg, total)', brazo:157.60, tipo:'persona', valorDefault:0, hint:'Hasta 2 personas'},

      {id:'equipaje_del', label:'Equipaje delantero (kg)', brazo:42.00, tipo:'equipaje', valorDefault:0, max_kg:45.4, max_lbl:'100 lbs'},
      {id:'equipaje_tras', label:'Equipaje trasero (kg)', brazo:178.70, tipo:'equipaje', valorDefault:0, max_kg:45.4, max_lbl:'100 lbs'}
    ],
    envolvente:[[82.0,2000],[82.0,2500],[84.0,3000],[91.4,3600],[96.0,3600],[96.0,2000]]
  }
};

const ETIQUETAS_AVION={
  'LV-OAD':'LV-OAD · Tomahawk PA-38-112',
  'LV-ART':'LV-ART · Archer II PA-28-181',
  'LV-MPH':'LV-MPH · Lance II PA-32RT-300'
};

function llenarSelector(){
  const sel=$('selAvion');
  sel.innerHTML=Object.keys(ETIQUETAS_AVION).map(k=>`<option value="${k}">${ETIQUETAS_AVION[k]}</option>`).join('');
  sel.value='LV-OAD';
}

/* ============================ CALCULO ============================ */
// Ray casting estándar: ¿el punto (x,y) cae dentro del polígono `poly`?
function puntoEnPoligono(x,y,poly){
  let dentro=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const [xi,yi]=poly[i], [xj,yj]=poly[j];
    if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) dentro=!dentro;
  }
  return dentro;
}

// Conversión para tooltips (misma constante que el resto del cálculo, kg_a_lb=2.2)
function lbsAKg(lbs, av){ return lbs/(av&&av.kg_a_lb?av.kg_a_lb:2.2); }

function calcular(av, valores){
  let pesoTotal=av.peso_vacio;
  let momento=av.peso_vacio*av.brazo_vacio;
  const excesos=[];   // estaciones que superan su propio max_kg (informativo, no bloqueante)
  for(const e of av.estaciones){
    const val=valores[e.id]||0;
    const pesoLbs=(e.tipo==='combustible'? val*av.fuel_kg_por_litro : val) * av.kg_a_lb;
    pesoTotal+=pesoLbs; momento+=pesoLbs*e.brazo;
    if(e.max_kg && val>e.max_kg) excesos.push(e.label+' supera el máximo ('+(e.max_lbl||e.max_kg+' kg')+')');
  }
  const cg=pesoTotal>0 ? momento/pesoTotal : av.brazo_vacio;
  const dentroEnvolvente=puntoEnPoligono(cg, pesoTotal, av.envolvente);
  const dentroMTOW=pesoTotal<=av.mtow;
  const comb=valores['combustible']||0;
  return{
    pesoTotal, cg, dentroEnvolvente, dentroMTOW, excesos,
    ok: dentroEnvolvente && dentroMTOW && !excesos.length,
    pesoDisponible: av.mtow-pesoTotal,
    autonomia: av.consumo_lh ? comb/av.consumo_lh : null
  };
}

/* ============================ ABACO (SVG) ============================ */
function svgAbaco(av, res){
  const W=520,H=360,PADL=52,PADB=36,PADT=18,PADR=18;
  const xs=av.envolvente.map(p=>p[0]), ys=av.envolvente.map(p=>p[1]);
  let xMin=Math.min(...xs), xMax=Math.max(...xs);
  let yMin=Math.min(...ys), yMax=Math.max(av.mtow,...ys);
  const xPad=(xMax-xMin)*0.18||1, yPad=(yMax-yMin)*0.12||50;
  xMin-=xPad; xMax+=xPad; yMin=Math.max(0,yMin-yPad); yMax+=yPad;
  const sx=x=>PADL+(x-xMin)/(xMax-xMin)*(W-PADL-PADR);
  const sy=y=>H-PADB-(y-yMin)/(yMax-yMin)*(H-PADB-PADT);
  const NT=5;
  const xTicks=Array.from({length:NT},(_,i)=>xMin+i*(xMax-xMin)/(NT-1));
  const yTicks=Array.from({length:NT},(_,i)=>yMin+i*(yMax-yMin)/(NT-1));
  const gridX=xTicks.map(t=>`<line x1="${sx(t)}" y1="${PADT}" x2="${sx(t)}" y2="${H-PADB}" stroke="var(--border)" stroke-width="1"/>
    <text x="${sx(t)}" y="${H-PADB+16}" font-family="var(--font-mono)" font-size="9" fill="var(--text3)" text-anchor="middle">${t.toFixed(1)}</text>`).join('');
  const gridY=yTicks.map(t=>`<line x1="${PADL}" y1="${sy(t)}" x2="${W-PADR}" y2="${sy(t)}" stroke="var(--border)" stroke-width="1"/>
    <text x="${PADL-8}" y="${sy(t)+3}" font-family="var(--font-mono)" font-size="9" fill="var(--text3)" text-anchor="end"><title>${lbsAKg(t,av).toFixed(0)} kg</title>${t.toFixed(0)}</text>`).join('');
  const poly=av.envolvente.map(p=>sx(p[0])+','+sy(p[1])).join(' ');
  const mtowY=sy(av.mtow);
  const cx=sx(res.cg), cy=sy(res.pesoTotal);
  const colorPunto=res.ok?'var(--cyan)':'var(--red)';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg)">
    ${gridX}${gridY}
    <line x1="${PADL}" y1="${mtowY}" x2="${W-PADR}" y2="${mtowY}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${W-PADR-4}" y="${mtowY-5}" font-family="var(--font-mono)" font-size="9" fill="var(--amber)" text-anchor="end"><title>${lbsAKg(av.mtow,av).toFixed(0)} kg</title>MTOW ${av.mtow}</text>
    <polygon points="${poly}" fill="rgba(0,200,212,.08)" stroke="var(--cyan)" stroke-width="1.6"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="${colorPunto}" stroke="var(--bg)" stroke-width="1.5"/>
    <text x="${PADL+ (W-PADL-PADR)/2}" y="${H-6}" font-family="var(--font-mono)" font-size="10" fill="var(--text2)" text-anchor="middle">BRAZO (pulgadas)</text>
    <text x="12" y="${PADT+(H-PADB-PADT)/2}" font-family="var(--font-mono)" font-size="10" fill="var(--text2)" text-anchor="middle" transform="rotate(-90 12 ${PADT+(H-PADB-PADT)/2})">PESO (lbs)</text>
  </svg>`;
}

/* ============================ RENDER ============================ */
function renderCalcArea(){
  const key=$('selAvion').value;
  const av=AERONAVES_WB[key];
  const area=$('calcArea');
  const avisoGeneral=`<div class="estado-box info" style="margin-bottom:14px">
      ℹ HERRAMIENTA DE PLANIFICACIÓN — este cálculo es una ayuda para estimar peso y
      balance antes del vuelo, NO reemplaza el cálculo oficial. Verificá siempre contra
      la planilla de pesaje vigente de la aeronave y la documentación oficial antes de
      cada vuelo.
    </div>`;
  area.innerHTML=`<div class="card">
    <h2>// CARGA — ${av.nombre}</h2>
    ${avisoGeneral}
    <div class="wb-grid">
      <div>
        ${av.estaciones.map(e=>`
          <div class="field">
            <label>${e.label}</label>
            <input type="number" id="in_${e.id}" min="0" step="1" value="${e.valorDefault}">
            ${e.hint?`<span class="hint">${e.hint}</span>`:''}
          </div>`).join('')}
      </div>
      <div>
        <div id="resBox"></div>
        <div class="abaco-wrap" id="abacoBox"></div>
      </div>
    </div>
  </div>`;
  av.estaciones.forEach(e=>{
    $('in_'+e.id).addEventListener('input',()=>actualizarResultado(key));
  });
  actualizarResultado(key);
}

function actualizarResultado(key){
  const av=AERONAVES_WB[key];
  const valores={};
  av.estaciones.forEach(e=>{ valores[e.id]=parseFloat($('in_'+e.id).value)||0; });
  const res=calcular(av, valores);
  let estadoTxt, estadoCls;
  if(res.ok){ estadoTxt='✓ DENTRO DE LA ENVOLVENTE — PESO Y BALANCE OK'; estadoCls='ok'; }
  else if(!res.dentroMTOW){ estadoTxt='⚠ EXCEDE EL MTOW'; estadoCls='bad'; }
  else if(res.excesos.length){ estadoTxt='⚠ '+res.excesos[0]; estadoCls='bad'; }
  else { estadoTxt='⚠ CG FUERA DE LA ENVOLVENTE'; estadoCls='bad'; }
  $('resBox').innerHTML=`
    <div class="estado-box ${estadoCls}">${estadoTxt}${!av.verificado&&res.ok?' (DATOS SIN VERIFICAR)':''}</div>
    <div class="kv"><span class="k">Peso total</span><span class="v" title="${(res.pesoTotal/av.kg_a_lb).toFixed(1)} kg">${res.pesoTotal.toFixed(1)} lbs</span></div>
    <div class="kv"><span class="k">MTOW</span><span class="v" title="${(av.mtow/av.kg_a_lb).toFixed(1)} kg">${av.mtow} lbs</span></div>
    <div class="kv"><span class="k">Peso disponible</span><span class="v" title="${(res.pesoDisponible/av.kg_a_lb).toFixed(1)} kg">${res.pesoDisponible.toFixed(1)} lbs</span></div>
    <div class="kv"><span class="k">CG actual</span><span class="v">${res.cg.toFixed(2)}"</span></div>
    ${res.autonomia!=null?`<div class="kv"><span class="k">Autonomía estimada</span><span class="v">${res.autonomia.toFixed(1)} h</span></div>`:''}
  `;
  $('abacoBox').innerHTML=svgAbaco(av,res);
}

llenarSelector();
$('selAvion').addEventListener('change',renderCalcArea);
renderCalcArea();
</script>
</body>
</html>
